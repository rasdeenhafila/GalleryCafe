<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Staff Account</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="form.css">
</head>

<body>
    <header class="header">
        <div class="nav-bar">
          <h1 class="title"><span>The Gallery Cafe</h1>
        </div>
    </header>

    <form id="orderForm" action="http://localhost/Gallerycafe/Admin/newStaff.php" method="post">

        <h2>Create Staff Account</h2>
        
        <label for="fname">First Name</label>
        <input type="text" id="fname" name="fname" required>

        <label for="lname">Last Name</label>
        <input type="text" id="lname" name="lname" required>

        <label for="mobile_No">Phone No.</label>
        <input type="tel" id="mobile_No" name="mobile_No" required>

        <label for="Email">Email</label>
        <input type="email" id="Email" name="Email" required>

        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required>

        <button type="submit">CREATE</button>
        
        
    </form>
   
</body>
</html>
